<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" fill="none">
  <defs>
    <linearGradient id="arch-bg" x1="0" y1="0" x2="720" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <rect width="720" height="360" rx="12" fill="url(#arch-bg)"/>
  <rect x="1" y="1" width="718" height="358" rx="11" stroke="#313244" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#cdd6f4">Architecture / Hybrid Isolation</text>

  <!-- ~/.claude symlink -->
  <rect x="40" y="60" width="160" height="50" rx="8" fill="#2a2a4a" stroke="#D4A574" stroke-width="2"/>
  <text x="120" y="82" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" font-weight="600" fill="#D4A574">~/.claude</text>
  <text x="120" y="98" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#6c7086">symlink</text>

  <!-- Arrow from symlink -->
  <line x1="200" y1="85" x2="260" y2="85" stroke="#D4A574" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="258,80 268,85 258,90" fill="#D4A574"/>

  <!-- Profiles directory -->
  <rect x="270" y="48" width="220" height="260" rx="10" fill="#1e1e35" stroke="#444466" stroke-width="1.5"/>
  <text x="380" y="72" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" font-weight="600" fill="#89b4fa">~/.claude-profiles/</text>

  <!-- Profile: default (active) -->
  <rect x="290" y="88" width="180" height="44" rx="6" fill="#2a2a4a" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="300" y="108" font-family="SF Mono, monospace" font-size="11" fill="#a6e3a1">* default</text>
  <text x="300" y="124" font-family="SF Mono, monospace" font-size="9" fill="#6c7086">  CLAUDE.md, settings, git...</text>

  <!-- Profile: reviewer -->
  <rect x="290" y="144" width="180" height="44" rx="6" fill="#2a2a4a" stroke="#444466" stroke-width="1"/>
  <text x="300" y="164" font-family="SF Mono, monospace" font-size="11" fill="#cdd6f4">  reviewer</text>
  <text x="300" y="180" font-family="SF Mono, monospace" font-size="9" fill="#6c7086">  CLAUDE.md, settings, git...</text>

  <!-- Profile: work -->
  <rect x="290" y="200" width="180" height="44" rx="6" fill="#2a2a4a" stroke="#444466" stroke-width="1"/>
  <text x="300" y="220" font-family="SF Mono, monospace" font-size="11" fill="#cdd6f4">  work</text>
  <text x="300" y="236" font-family="SF Mono, monospace" font-size="9" fill="#6c7086">  CLAUDE.md, settings, git...</text>

  <!-- .ccp.json -->
  <rect x="290" y="256" width="180" height="34" rx="6" fill="#1a1a30" stroke="#333355" stroke-width="1"/>
  <text x="380" y="278" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#6c7086">.ccp.json  |  .ccp.lock</text>

  <!-- CLAUDE_CONFIG_DIR -->
  <rect x="520" y="144" width="175" height="76" rx="8" fill="#2a2a4a" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="607" y="168" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" font-weight="600" fill="#f9e2af">CLAUDE_CONFIG_DIR</text>
  <text x="607" y="186" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#6c7086">parallel launch</text>
  <text x="607" y="204" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#6c7086">no symlink change</text>

  <!-- Arrow from profiles to CLAUDE_CONFIG_DIR -->
  <line x1="470" y1="170" x2="516" y2="170" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="514,166 520,170 514,174" fill="#f9e2af"/>

  <!-- Legend -->
  <g transform="translate(40, 310)">
    <line x1="0" y1="8" x2="24" y2="8" stroke="#D4A574" stroke-width="2"/>
    <text x="32" y="12" font-family="SF Mono, monospace" font-size="10" fill="#6c7086">Primary: symlink switching</text>

    <line x1="240" y1="8" x2="264" y2="8" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="272" y="12" font-family="SF Mono, monospace" font-size="10" fill="#6c7086">Secondary: env var override</text>

    <rect x="480" y="0" width="14" height="14" rx="3" stroke="#a6e3a1" stroke-width="1.5" fill="none"/>
    <text x="500" y="12" font-family="SF Mono, monospace" font-size="10" fill="#6c7086">Active profile</text>
  </g>
</svg>
