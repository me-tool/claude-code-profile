<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" fill="none">
  <defs>
    <linearGradient id="lc-bg" x1="0" y1="0" x2="720" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <rect width="720" height="180" rx="12" fill="url(#lc-bg)"/>
  <rect x="1" y="1" width="718" height="178" rx="11" stroke="#313244" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#cdd6f4">Lifecycle</text>

  <!-- Node 1: ~/.claude (original) -->
  <rect x="30" y="50" width="130" height="46" rx="8" fill="#2a2a4a" stroke="#D4A574" stroke-width="1.5"/>
  <text x="95" y="70" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="600" fill="#D4A574">~/.claude</text>
  <text x="95" y="85" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#6c7086">original</text>

  <!-- Arrow: init -->
  <line x1="160" y1="73" x2="210" y2="73" stroke="#a6e3a1" stroke-width="1.5"/>
  <polygon points="208,68 218,73 208,78" fill="#a6e3a1"/>
  <text x="189" y="65" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" font-weight="600" fill="#a6e3a1">init</text>

  <!-- Node 2: profiles/default -->
  <rect x="220" y="50" width="160" height="46" rx="8" fill="#2a2a4a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="300" y="70" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" font-weight="600" fill="#89b4fa">~/.claude-profiles/</text>
  <text x="300" y="85" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#cdd6f4">default</text>

  <!-- Arrow: symlink -->
  <line x1="380" y1="73" x2="430" y2="73" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="428,68 438,73 428,78" fill="#6c7086"/>
  <text x="409" y="65" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#6c7086">symlink</text>

  <!-- Node 3: ~/.claude -> default (active state) -->
  <rect x="440" y="50" width="140" height="46" rx="8" fill="#2a2a4a" stroke="#a6e3a1" stroke-width="2"/>
  <text x="510" y="70" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="600" fill="#a6e3a1">~/.claude</text>
  <text x="510" y="85" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#6c7086">&#8594; default</text>

  <!-- Node 4: restored -->
  <rect x="570" y="115" width="120" height="46" rx="8" fill="#2a2a4a" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="630" y="135" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" font-weight="600" fill="#f9e2af">~/.claude</text>
  <text x="630" y="150" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#6c7086">restored</text>

  <!-- Arrow: pause -->
  <path d="M 560 96 L 560 138 L 570 138" stroke="#f9e2af" stroke-width="1.5" fill="none"/>
  <polygon points="568,133 578,138 568,143" fill="#f9e2af"/>
  <text x="548" y="120" text-anchor="end" font-family="SF Mono, monospace" font-size="9" font-weight="600" fill="#f9e2af">pause</text>

  <!-- Arrow: resume -->
  <path d="M 680 115 L 680 96 L 580 96" stroke="#a6e3a1" stroke-width="1.5" fill="none"/>
  <polygon points="582,91 572,96 582,101" fill="#a6e3a1"/>
  <text x="690" y="108" font-family="SF Mono, monospace" font-size="9" font-weight="600" fill="#a6e3a1">resume</text>

  <!-- Arrow: uninstall (from active state, under nodes, back up to original) -->
  <path d="M 510 96 L 510 115 L 95 115 L 95 96" stroke="#f38ba8" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="90,98 95,88 100,98" fill="#f38ba8"/>
  <text x="300" y="130" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" font-weight="600" fill="#f38ba8">uninstall</text>
</svg>
